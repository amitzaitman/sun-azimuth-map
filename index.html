<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="מפה טופוגרפית עם זווית השמש בזמן אמת או לפי בחירה – מיקום מהמכשיר או ידני" />
  <title>זווית השמש על מפה טופוגרפית</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- SunCalc -->
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    #map { height: 100%; width: 100%; background: #d4e6f1; }

    .panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      padding: 16px 18px;
      width: min(340px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.45;
      color: #1a1a1a;
    }

    .panel h1 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0d47a1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel h1 span.icon { font-size: 22px; }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      font-weight: 600;
      font-size: 13px;
      color: #333;
      min-width: 70px;
    }

    input[type="date"],
    input[type="time"],
    input[type="number"] {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #c5c5c5;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      min-width: 0;
    }

    input[type="number"] { max-width: 110px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #1565c0;
      color: white;
      flex: 1;
    }
    .btn-primary:hover { background: #0d47a1; }

    .btn-secondary {
      background: #e3f2fd;
      color: #0d47a1;
    }
    .btn-secondary:hover { background: #bbdefb; }

    .btn-now {
      background: #ff9800;
      color: white;
    }
    .btn-now:hover { background: #f57c00; }

    .info-box {
      background: linear-gradient(135deg, #fff8e1 0%, #fff3e0 100%);
      border: 1px solid #ffe0b2;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 8px;
      margin-bottom: 6px;
    }

    .info-box .big {
      font-size: 22px;
      font-weight: 700;
      color: #e65100;
      margin: 4px 0;
    }

    .info-box .sub {
      font-size: 13px;
      color: #5d4037;
    }

    .sun-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }
    .sun-up { background: #fff59d; color: #f57f17; }
    .sun-down { background: #cfd8dc; color: #455a64; }

    .times-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 12px;
      margin-top: 10px;
      color: #555;
    }
    .times-grid strong { color: #333; }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      line-height: 1.4;
    }

    .coords {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      background: #f5f5f5;
      padding: 6px 8px;
      border-radius: 6px;
      direction: ltr;
      text-align: left;
    }

    /* Make Leaflet attribution less intrusive */
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255,255,255,0.8) !important;
    }

    @media (max-width: 480px) {
      .panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        max-height: 48vh;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel" id="panel">
    <h1><span class="icon">☀️</span> זווית השמש</h1>

    <div class="row">
      <button class="btn-primary" id="btnLocate" type="button">📍 השתמש במיקום שלי</button>
    </div>

    <div class="row">
      <label>תאריך</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="row">
      <label>שעה</label>
      <input type="time" id="timeInput" step="60" />
      <button class="btn-now" id="btnNow" type="button">עכשיו</button>
    </div>

    <div class="row">
      <label>קו רוחב</label>
      <input type="number" id="latInput" step="0.0001" />
    </div>
    <div class="row">
      <label>קו אורך</label>
      <input type="number" id="lonInput" step="0.0001" />
    </div>

    <div class="info-box" id="sunInfo">
      <div class="sub">גובה השמש מעל האופק</div>
      <div class="big" id="altDisplay">—</div>
      <div class="sub">אזימוט (כיוון מהצפון)</div>
      <div class="big" id="azDisplay">—</div>
      <div id="sunStatus" class="sun-status"></div>
    </div>

    <div class="times-grid" id="timesGrid">
      <!-- filled by JS -->
    </div>

    <p class="hint">
      • לחץ על המפה כדי לשנות מיקום<br>
      • הקו הכתום מציג את כיוון השמש (אזימוט)<br>
      • הקו האפור מציג את כיוון הצל
    </p>
  </div>

  <script>
    // ========== Config ==========
    const DEFAULT_LAT = 31.9640;   // ראשון לציון
    const DEFAULT_LON = 34.8040;
    const LINE_KM = 4.5;          // אורך קו הכיוון

    // ========== State ==========
    let map, marker, sunLine, shadowLine;
    let currentLat = DEFAULT_LAT;
    let currentLon = DEFAULT_LON;

    // ========== Helpers ==========
    function toRad(d) { return d * Math.PI / 180; }
    function toDeg(r) { return r * 180 / Math.PI; }

    // Destination point (approx spherical)
    function destinationPoint(lat, lon, bearingDeg, distKm) {
      const R = 6371;
      const brng = toRad(bearingDeg);
      const φ1 = toRad(lat);
      const λ1 = toRad(lon);
      const δ = distKm / R;

      const φ2 = Math.asin(Math.sin(φ1) * Math.cos(δ) + Math.cos(φ1) * Math.sin(δ) * Math.cos(brng));
      const λ2 = λ1 + Math.atan2(
        Math.sin(brng) * Math.sin(δ) * Math.cos(φ1),
        Math.cos(δ) - Math.sin(φ1) * Math.sin(φ2)
      );
      return [toDeg(φ2), ((toDeg(λ2) + 540) % 360) - 180]; // normalize lon
    }

    function bearingToCardinal(az) {
      const dirs = ['צפון', 'צפון־מזרח', 'מזרח', 'דרום־מזרח', 'דרום', 'דרום־מערב', 'מערב', 'צפון־מערב'];
      const idx = Math.round(az / 45) % 8;
      return dirs[idx];
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function formatTime(d) {
      if (!d || isNaN(d.getTime())) return '—';
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    // ========== Map init ==========
    function initMap() {
      map = L.map('map', {
        zoomControl: true,
        attributionControl: true
      }).setView([DEFAULT_LAT, DEFAULT_LON], 14);

      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 17,
        attribution: 'Kartendaten: © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-Mitwirkende, SRTM | Kartendarstellung: © <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)'
      }).addTo(map);

      // Marker
      marker = L.marker([DEFAULT_LAT, DEFAULT_LON], {
        draggable: true,
        title: 'מיקום נבחר'
      }).addTo(map);

      marker.on('dragend', function () {
        const pos = marker.getLatLng();
        setLocation(pos.lat, pos.lng, false);
      });

      map.on('click', function (e) {
        setLocation(e.latlng.lat, e.latlng.lng, true);
      });

      // Initial
      setNow();
      setLocation(DEFAULT_LAT, DEFAULT_LON, false);
      updateSun();
    }

    // ========== Location ==========
    function setLocation(lat, lon, moveMarker) {
      currentLat = +lat.toFixed(5);
      currentLon = +lon.toFixed(5);
      document.getElementById('latInput').value = currentLat;
      document.getElementById('lonInput').value = currentLon;

      if (moveMarker !== false) {
        marker.setLatLng([currentLat, currentLon]);
      }
      updateSun();
    }

    // ========== Time ==========
    function getSelectedDate() {
      const d = document.getElementById('dateInput').value;
      const t = document.getElementById('timeInput').value;
      if (!d || !t) return new Date();
      // Local time construction
      const [hh, mm] = t.split(':').map(Number);
      const date = new Date(d + 'T00:00:00');
      date.setHours(hh, mm, 0, 0);
      return date;
    }

    function setNow() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = pad(now.getMonth() + 1);
      const dd = pad(now.getDate());
      document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;
      document.getElementById('timeInput').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
      updateSun();
    }

    // ========== Sun calculation & visualization ==========
    function updateSun() {
      const date = getSelectedDate();
      const pos = SunCalc.getPosition(date, currentLat, currentLon);

      // SunCalc 1.9 returns altitude & azimuth in radians.
      // Azimuth is measured from south, clockwise.
      // Convert to degrees from north (standard map / meteorological azimuth).
      let altitudeDeg = toDeg(pos.altitude);
      let azimuthDeg  = (toDeg(pos.azimuth) + 180) % 360;

      const altEl = document.getElementById('altDisplay');
      const azEl  = document.getElementById('azDisplay');
      const statusEl = document.getElementById('sunStatus');

      altEl.textContent = altitudeDeg.toFixed(1) + '°';
      azEl.textContent  = azimuthDeg.toFixed(1) + '°  (' + bearingToCardinal(azimuthDeg) + ')';

      if (altitudeDeg > 0) {
        statusEl.textContent = 'השמש מעל האופק';
        statusEl.className = 'sun-status sun-up';
      } else {
        statusEl.textContent = 'השמש מתחת לאופק';
        statusEl.className = 'sun-status sun-down';
      }

      // Times of day
      const times = SunCalc.getTimes(date, currentLat, currentLon);
      const grid = document.getElementById('timesGrid');
      grid.innerHTML = `
        <div>זריחה: <strong>${formatTime(times.sunrise)}</strong></div>
        <div>שקיעה: <strong>${formatTime(times.sunset)}</strong></div>
        <div>צהריים סולאריים: <strong>${formatTime(times.solarNoon)}</strong></div>
        <div>שעת זהב: <strong>${formatTime(times.goldenHour)}</strong></div>
      `;

      // Draw lines
      drawDirectionLines(azimuthDeg, altitudeDeg);
    }

    function drawDirectionLines(azimuthDeg, altitudeDeg) {
      // Remove old
      if (sunLine) map.removeLayer(sunLine);
      if (shadowLine) map.removeLayer(shadowLine);

      const start = [currentLat, currentLon];

      // Sun direction
      const sunEnd = destinationPoint(currentLat, currentLon, azimuthDeg, LINE_KM);
      sunLine = L.polyline([start, sunEnd], {
        color: '#ff6f00',
        weight: 4,
        opacity: altitudeDeg > 0 ? 0.9 : 0.35,
        dashArray: altitudeDeg > 0 ? null : '8,10',
        lineCap: 'round'
      }).addTo(map);

      // Shadow is opposite
      const shadowAz = (azimuthDeg + 180) % 360;
      const shadowEnd = destinationPoint(currentLat, currentLon, shadowAz, LINE_KM * 0.7);
      shadowLine = L.polyline([start, shadowEnd], {
        color: '#546e7a',
        weight: 3,
        opacity: altitudeDeg > 0 ? 0.55 : 0.2,
        dashArray: '6,8'
      }).addTo(map);
    }

    // ========== Events ==========
    document.getElementById('btnLocate').addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('הדפדפן לא תומך במיקום');
        return;
      }
      document.getElementById('btnLocate').textContent = 'מאתר...';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setLocation(pos.coords.latitude, pos.coords.longitude, true);
          map.setView([pos.coords.latitude, pos.coords.longitude], 15);
          document.getElementById('btnLocate').textContent = '📍 השתמש במיקום שלי';
        },
        (err) => {
          alert('לא הצלחתי לקבל מיקום: ' + err.message);
          document.getElementById('btnLocate').textContent = '📍 השתמש במיקום שלי';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    document.getElementById('btnNow').addEventListener('click', setNow);

    document.getElementById('dateInput').addEventListener('change', updateSun);
    document.getElementById('timeInput').addEventListener('change', updateSun);
    document.getElementById('timeInput').addEventListener('input', updateSun);

    document.getElementById('latInput').addEventListener('change', () => {
      const lat = parseFloat(document.getElementById('latInput').value);
      const lon = parseFloat(document.getElementById('lonInput').value);
      if (!isNaN(lat) && !isNaN(lon)) {
        setLocation(lat, lon, true);
        map.setView([lat, lon], map.getZoom());
      }
    });
    document.getElementById('lonInput').addEventListener('change', () => {
      const lat = parseFloat(document.getElementById('latInput').value);
      const lon = parseFloat(document.getElementById('lonInput').value);
      if (!isNaN(lat) && !isNaN(lon)) {
        setLocation(lat, lon, true);
        map.setView([lat, lon], map.getZoom());
      }
    });

    // ========== Start ==========
    initMap();
  </script>
</body>
</html>
